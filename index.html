    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .fill-icon {
        font-variation-settings: "FILL" 1;
      }

      .circle-decor {
        position: absolute;
        border-radius: 50%;
        mix-blend-mode: multiply;
        z-index: 10;
        pointer-events: none;
        translate: 0 0;
        will-change: translate;
        opacity: 1 !important;
      }

      .max-w-container-max {
        max-width: 100% !important;
      }

      .px-gutter {
        padding-left: 5% !important;
        padding-right: 5% !important;
      }

      .nav-logo {
        width: 120px;
        height: auto;
        transform-origin: center;
      }

      .floating-circle {
        animation: circleFloat 6.6s ease-in-out infinite alternate;
        opacity: 1 !important;
      }

      .floating-circle[data-anim="blue"] {
        animation-duration: 7s;
      }

      .floating-circle[data-anim="purple"] {
        animation-duration: 8s;
      }

      .floating-circle[data-anim="teal"] {
        animation-duration: 5.8s;
      }

      @keyframes circleFloat {
        0% {
          transform: translate3d(0, 0, 0);
        }
        50% {
          transform: translate3d(9px, -12px, 0);
        }
        100% {
          transform: translate3d(-9px, 8px, 0);
        }
      }

      .heading-fill {
        font-size: clamp(40px, 9vw, 180px);
        white-space: nowrap;
        letter-spacing: normal;
        text-align: center;
      }

      .hero-typewriter {
        min-height: 1.05em;
      }

      .hero-title-wrap {
        position: relative;
        display: inline-block;
      }

      .hero-sweep-circle {
        width: clamp(140px, 15vw, 220px);
        height: clamp(140px, 15vw, 220px);
        left: calc(-1 * clamp(140px, 15vw, 220px));
        top: 50%;
        transform: translateY(-50%);
        z-index: -1;
      }

      .hero-sweep-active {
        animation: heroSweepAcross 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes heroSweepAcross {
        from {
          left: calc(-1 * clamp(140px, 15vw, 220px));
        }
        to {
          left: 100%;
        }
      }

      [data-reveal] {
        opacity: 0;
        translate: 0 var(--reveal-y, 12px);
        scale: var(--reveal-scale, 1);
        transition:
          opacity 600ms cubic-bezier(0.22, 1, 0.36, 1),
          translate 600ms cubic-bezier(0.22, 1, 0.36, 1),
          scale 600ms cubic-bezier(0.22, 1, 0.36, 1);
        transition-delay: var(--reveal-delay, 0ms);
      }
      [data-reveal="fade"] {
        translate: 0 0;
      }
      [data-reveal="up"] {
        --reveal-y: 12px;
      }
      [data-reveal="left"] {
        translate: -12px 0;
      }
      [data-reveal="right"] {
        translate: 12px 0;
      }
      [data-reveal="scale"] {
        translate: 0 0;
        --reveal-scale: 0.98;
      }
      .is-visible[data-reveal] {
        opacity: 1;
        translate: 0 0;
        scale: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] {
          opacity: 1;
          translate: 0 0;
          scale: 1;
          transition: none;
        }
      }

      .interactive-lift {
        transition: translate 200ms ease, background-color 200ms ease, color 200ms ease;
      }
      .interactive-lift:hover {
        translate: 0 -2px;
      }
      .press:active {
        scale: 0.98;
      }
    </style>

    <script>
      (() => {
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const circles = document.querySelectorAll(".circle-decor[data-anim]");
        const revealEls = document.querySelectorAll("[data-reveal]");
        const typeTarget = document.getElementById("hero-typewriter-text");
        const heroYellowCircle = document.getElementById("hero-yellow-circle");
        const heroText = "Seeing the Unseen";
        let heroTypeStarted = false;

        const startHeroTypewriter = () => {
          if (!typeTarget || heroTypeStarted) return;
          heroTypeStarted = true;
          typeTarget.textContent = "";
          heroYellowCircle?.classList.add("hero-sweep-active");

          const duration = 2200;
          const startAt = performance.now();

          const render = (now) => {
            const elapsed = now - startAt;
            const progress = Math.min(1, elapsed / duration);
            const revealCount = Math.min(heroText.length, Math.floor(progress * heroText.length));
            typeTarget.textContent = heroText.slice(0, revealCount);

            if (progress < 1) {
              requestAnimationFrame(render);
              return;
            }

            typeTarget.textContent = heroText;
            heroYellowCircle?.classList.add("floating-circle");
          };

          requestAnimationFrame(render);
        };

        const reveal = (el) => {
          el.classList.add("is-visible");
        };

        // Immediately start floating for other circles
        circles.forEach((el) => {
          if (heroYellowCircle && el === heroYellowCircle) return;
          el.classList.add("floating-circle");
        });

        if (reduceMotion) {
          if (typeTarget) typeTarget.textContent = heroText;
          revealEls.forEach(reveal);
          return;
        }

        if (!("IntersectionObserver" in window)) {
          if (typeTarget) typeTarget.textContent = heroText;
          heroYellowCircle?.classList.add("floating-circle");
          revealEls.forEach(reveal);
          return;
        }

        const observer = new IntersectionObserver(
          (entries, obs) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              const el = entry.target;
              if (el === heroYellowCircle) {
                startHeroTypewriter();
              } else if (el.matches("[data-reveal]")) {
                reveal(el);
              }
              obs.unobserve(el);
            }
          },
          { threshold: 0.15, rootMargin: "0px 0px -10% 0px" }
        );

        if (heroYellowCircle) observer.observe(heroYellowCircle);
        revealEls.forEach((el) => observer.observe(el));
      })();
    </script>
