    <script>
      /* ════════════════════════════════════════════
         LOGO INTRO ANIMATION
         Sequence (loops forever):
           0.0s – 0.6s  : 6 balls drift in from random positions
           0.6s – 1.4s  : balls morph/slide into letter positions
           1.4s – 2.2s  : each ball expands to fill its letter shape
           2.2s – 2.8s  : letters turn from color → brown #4B332D
           2.8s – 3.4s  : 2nd E blinks (opacity oscillates)
           3.4s – 3.9s  : 2nd E fades out
           3.9s – 4.7s  : pause with UNSEN
           4.7s – 5.2s  : fade out everything
           5.2s          : restart
         ════════════════════════════════════════════ */
      (function () {
        const canvas = document.getElementById("logo-canvas");
        const ctx = canvas.getContext("2d");
        const intro = document.getElementById("logo-intro");

        const COLORS = ["#4680BE", "#D74737", "#EBB5CA", "#E5C543", "#68AC9D", "#6D65A1"];
        const BROWN = "#4B332D";
        const LETTERS = ["U", "N", "S", "E", "E", "N"];

        // Timing (seconds)
        const T = {
          ballsIn:     1.2,   // balls fly in from off-screen (2× slower)
          orbitStart:  1.2,   // start orbiting around center
          orbitEnd:    2.2,   // stop orbit after 1.0s (2× slower)
          morphStart:  2.2,
          morphEnd:    3.1,
          fillStart:   3.1,
          fillEnd:     3.9,
          colorStart:  3.9,
          colorEnd:    4.6,
          //blinkStart:  4.6,
          //blinkEnd:    6.7,   // 2.1s blink window (3× slower)
          fadeE2Start: 5.6,
          fadeE2End:   6.4,
          pause:       8.0,
          fadeOut:     8.5,
          total:       9.0,
        };

        let W, H, letterPositions, ballRadius, fontSize;
        let startTime = null;
        let raf = null;

        // Easing
        const ease = (t) => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        const lerp = (a, b, t) => a + (b - a) * t;
        const clamp01 = (t) => Math.max(0, Math.min(1, t));

        function hexToRgb(hex) {
          const r = parseInt(hex.slice(1,3),16);
          const g = parseInt(hex.slice(3,5),16);
          const b = parseInt(hex.slice(5,7),16);
          return {r, g, b};
        }
        function lerpColor(c1, c2, t) {
          const a = hexToRgb(c1), b = hexToRgb(c2);
          return `rgb(${Math.round(lerp(a.r,b.r,t))},${Math.round(lerp(a.g,b.g,t))},${Math.round(lerp(a.b,b.b,t))})` ;
        }

        function resize() {
          W = canvas.width  = window.innerWidth;
          H = canvas.height = window.innerHeight;
          fontSize = Math.min(W * 0.18, H * 0.35, 200);
          ballRadius = fontSize * 0.38;
          letterPositions = measureLetters();
        }

        function measureLetters() {
          ctx.font = `900 ${fontSize}px 'Franklin Gothic Medium Regular', Arial Black, sans-serif`;
          ctx.textBaseline = "middle";
          const totalW = LETTERS.reduce((acc, l) => acc + ctx.measureText(l).width, 0);
          const spacing = fontSize * 0.05;
          const fullW = totalW + spacing * (LETTERS.length - 1);
          let x = (W - fullW) / 2;
          const y = H / 2;
          return LETTERS.map((l) => {
            const w = ctx.measureText(l).width;
            const cx = x + w / 2;
            x += w + spacing;
            return { cx, cy: y, w };
          });
        }

        // Random off-screen start positions for each ball
        let ballStarts = [];
        function initBallStarts() {
          ballStarts = LETTERS.map((_, i) => {
            const angle = (i / LETTERS.length) * Math.PI * 2 + Math.PI * 0.25;
            const dist = Math.max(W, H) * 0.7;
            return {
              x: W / 2 + Math.cos(angle) * dist,
              y: H / 2 + Math.sin(angle) * dist,
            };
          });
        }

        function drawFrame(elapsed) {
          const t = elapsed / 1000; // seconds
          ctx.clearRect(0, 0, W, H);

          // Global fade-out at end
          let globalAlpha = 1;
          if (t >= T.fadeOut) {
            globalAlpha = clamp01(1 - (t - T.fadeOut) / (T.total - T.fadeOut));
          }

          ctx.save();
          ctx.globalAlpha = globalAlpha;
          // Scale entire animation to 0.8× around canvas center
          ctx.translate(W / 2, H / 2);
          ctx.scale(0.8, 0.8);
          ctx.translate(-W / 2, -H / 2);

          // Determine 2nd-E visibility
          let e2Alpha = 1;
          if (t >= T.blinkStart && t < T.blinkEnd) {
            const bk = (t - T.blinkStart) / (T.blinkEnd - T.blinkStart);
            e2Alpha = 0.5 + 0.5 * Math.sin(bk * Math.PI * 0.5); // oscillates ~1 time
          } else if (t >= T.fadeE2Start && t < T.fadeE2End) {
            e2Alpha = clamp01(1 - (t - T.fadeE2Start) / (T.fadeE2End - T.fadeE2Start));
          } else if (t >= T.fadeE2End) {
            e2Alpha = 0;
          }

          for (let i = 0; i < LETTERS.length; i++) {
            const color = COLORS[i];
            const target = letterPositions[i];
            const isE2 = i === 4; // second E

            let cx, cy, alpha = 1;
            if (isE2) alpha = e2Alpha;

            // Phase 1a: balls fly in from off-screen → orbit ring entry point
            // Phase 1b: orbit around center for 0.5s
            // Phase 2:  converge from orbit position → letter center
            const orbitRadius = Math.min(W, H) * 0.31;
            // Each ball has a base angle on the ring (evenly spaced)
            const baseAngle = (i / LETTERS.length) * Math.PI * 2 - Math.PI / 2;
            // Where the ball sits on the orbit ring
            const orbitX = W / 2 + Math.cos(baseAngle) * orbitRadius;
            const orbitY = H / 2 + Math.sin(baseAngle) * orbitRadius;

            if (t < T.orbitStart) {
              // Fly in: from off-screen start → orbit ring position
              const p = ease(clamp01(t / T.ballsIn));
              cx = lerp(ballStarts[i].x, orbitX, p);
              cy = lerp(ballStarts[i].y, orbitY, p);
            } else if (t < T.orbitEnd) {
              // Orbit: rotate 1 full turn around center
              const op = (t - T.orbitStart) / (T.orbitEnd - T.orbitStart);
              const spin = op * Math.PI * 2; // full revolution
              const angle = baseAngle + spin;
              cx = W / 2 + Math.cos(angle) * orbitRadius;
              cy = H / 2 + Math.sin(angle) * orbitRadius;
            } else if (t < T.morphStart) {
              // Snap-back landing on orbit position before morph starts
              cx = orbitX;
              cy = orbitY;
            } else {
              // Converge from orbit position → letter center
              const p = ease(clamp01((t - T.morphStart) / (T.morphEnd - T.morphStart)));
              cx = lerp(orbitX, target.cx, p);
              cy = lerp(orbitY, target.cy, p);
            }

            // Phase 2: morph — we transition from circle → letter clip
            const morphP = clamp01((t - T.morphStart) / (T.morphEnd - T.morphStart));
            const fillP  = clamp01((t - T.fillStart)  / (T.fillEnd  - T.fillStart));
            const colorP = clamp01((t - T.colorStart)  / (T.colorEnd - T.colorStart));

            const currentColor = lerpColor(color, BROWN, ease(colorP));

            if (alpha <= 0) continue;

            ctx.save();
            ctx.globalAlpha *= alpha;

            if (morphP < 1) {
              // Draw as circle — fixed size throughout fly-in and orbit
              const r = ballRadius * 0.7;
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.fillStyle = currentColor;
              ctx.fill();
            } else {
              // Draw letter with radial reveal from center outward
              // Use clipping: reveal circle expanding from letter center
              ctx.save();
              if (fillP < 1) {
                // Clip to expanding circle
                const maxR = Math.sqrt(target.w * target.w + fontSize * fontSize);
                const clipR = ease(fillP) * maxR * 1.5;
                ctx.beginPath();
                ctx.arc(target.cx, target.cy, clipR, 0, Math.PI * 2);
                ctx.clip();
              }
              ctx.font = `900  ${fontSize}px 'Franklin Gothic Medium Regular', Arial Black, sans-serif`;
              ctx.textBaseline = "middle";
              ctx.textAlign = "center";
              ctx.fillStyle = currentColor;
              ctx.fillText(LETTERS[i], target.cx, target.cy);
              ctx.restore();
            }

            ctx.restore();
          }

          ctx.restore();
        }

        function loop(ts) {
          if (startTime === null) startTime = ts;
          const elapsed = ts - startTime;

          drawFrame(elapsed);

          if (elapsed >= T.total * 1000) {
            // Restart
            startTime = null;
            initBallStarts();
          }

          raf = requestAnimationFrame(loop);
        }

        function start() {
          resize();
          initBallStarts();
          startTime = null;
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(loop);
        }

        window.addEventListener("resize", () => { resize(); initBallStarts(); });
        start();
      })();
    </script>

    <script>
      (() => {
        // --- Mobile menu toggle ---
        const toggle = document.getElementById('nav-toggle');
        const menu = document.getElementById('mobile-menu');
        function openMenu() {
          menu.style.display = 'block';
          toggle.setAttribute('aria-expanded', 'true');
          toggle.setAttribute('aria-label', 'Close menu');
          toggle.querySelector('.material-symbols-outlined').textContent = 'close';
        }
        function closeMenu() {
          menu.style.display = 'none';
          toggle.setAttribute('aria-expanded', 'false');
          toggle.setAttribute('aria-label', 'Open menu');
          toggle.querySelector('.material-symbols-outlined').textContent = 'menu';
        }
        toggle.addEventListener('click', () => {
          toggle.getAttribute('aria-expanded') === 'true' ? closeMenu() : openMenu();
        });
        menu.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
        document.addEventListener('click', (e) => {
          if (!menu.contains(e.target) && !toggle.contains(e.target)) closeMenu();
        });
      })();
    </script>

    <script>
      (() => {
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const circles = document.querySelectorAll(".circle-decor[data-anim]");
        const revealEls = document.querySelectorAll("[data-reveal]");
        const typeTarget = document.getElementById("hero-typewriter-text");
        const heroYellowCircle = document.getElementById("hero-yellow-circle");
        const heroText = "Seeing the Unseen";
        let heroTypeStarted = false;

        const startHeroTypewriter = () => {
          if (!typeTarget || heroTypeStarted) return;
          heroTypeStarted = true;
          typeTarget.textContent = "";
          heroYellowCircle?.classList.add("hero-sweep-active");

          const duration = 2200;
          const startAt = performance.now();

          const render = (now) => {
            const elapsed = now - startAt;
            const progress = Math.min(1, elapsed / duration);
            const revealCount = Math.min(heroText.length, Math.floor(progress * heroText.length));
            typeTarget.textContent = heroText.slice(0, revealCount);

            if (progress < 1) {
              requestAnimationFrame(render);
              return;
            }

            typeTarget.textContent = heroText;
            heroYellowCircle?.classList.add("floating-circle");
          };

          requestAnimationFrame(render);
        };

        const reveal = (el) => {
          el.classList.add("is-visible");
        };

        // Immediately start floating for other circles
        circles.forEach((el) => {
          if (heroYellowCircle && el === heroYellowCircle) return;
          el.classList.add("floating-circle");
        });

        if (reduceMotion) {
          if (typeTarget) typeTarget.textContent = heroText;
          revealEls.forEach(reveal);
          return;
        }

        if (!("IntersectionObserver" in window)) {
          if (typeTarget) typeTarget.textContent = heroText;
          heroYellowCircle?.classList.add("floating-circle");
          revealEls.forEach(reveal);
          return;
        }

        const observer = new IntersectionObserver(
          (entries, obs) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              const el = entry.target;
              if (el === heroYellowCircle) {
                startHeroTypewriter();
              } else if (el.matches("[data-reveal]")) {
                reveal(el);
              }
              obs.unobserve(el);
            }
          },
          { threshold: 0.15, rootMargin: "0px 0px -10% 0px" }
        );

        if (heroYellowCircle) observer.observe(heroYellowCircle);
        revealEls.forEach((el) => observer.observe(el));
      })();
    </script>
  </body>
</html>
